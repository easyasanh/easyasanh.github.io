<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Olive You</title>
  <link rel="stylesheet" href="style.css?v=20260417-5" />
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="hero-copy">
        <div class="brand-lockup">
          <img src="logo copy.png" alt="Olive You Logo" class="brand-lockup__logo" />
          <p class="tagline">The most objective food reviews by expert food critics Andrew and Nadia</p>
        </div>
      </div>

      <aside class="hero-panel">
        <div class="stat">
          <span>Restaurants reviewed</span>
          <strong id="restaurant-count">0</strong>
        </div>
        <div class="stat">
          <span>Michelin</span>
          <strong id="michelin-count">0</strong>
        </div>
      </aside>
    </section>

    <main class="layout">
      <section class="toolbar" aria-label="Sort restaurants">
        <label class="sort-control" for="sort-select">
          <span>Sort by</span>
          <select id="sort-select">
            <option value="avg-desc">Avg (High → Low)</option>
            <option value="avg-asc">Avg (Low → High)</option>
            <option value="andrew-desc">Andrew (High → Low)</option>
            <option value="andrew-asc">Andrew (Low → High)</option>
            <option value="nadia-desc">Nadia (High → Low)</option>
            <option value="nadia-asc">Nadia (Low → High)</option>
            <option value="city-asc">City (A → Z)</option>
            <option value="city-desc">City (Z → A)</option>
            <option value="name-asc">Name (A → Z)</option>
            <option value="name-desc">Name (Z → A)</option>
          </select>
        </label>
      </section>

      <section id="restaurant-list" class="list" aria-live="polite">Loading…</section>
    </main>
  </div>

  <script src="app.js?v=20260417-5"></script>
</body>
</html>
